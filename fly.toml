# fly.toml app configuration file generated for molty5 on 2026-04-25T16:14:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'molty5'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[[mounts]]
  source = 'molty_memory'
  destination = '/root/.molty-royale'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  ports = []
  processes = ['app']

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = '10s'
    timeout = '2s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
